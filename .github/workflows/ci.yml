name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. Setup Java (con cache moderno integrado)
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. (Opcional pero recomendado) Build + test con Maven
      #- name: Build and test with Maven
      #  run: ./mvnw clean package -DskipTests=false

      # 4. Log in to Docker Hub (antes del build/push no es obligatorio, pero más claro así)
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Docker image (optimizado con cache GitHub Actions)
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aws-asr:${{ github.sha }}